<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <body class="bg-light">

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow-sm">
<div class="card-body">
<h1 class="h5 mb-3">Mark Calculator (PW1 + PW2)</h1>

<div class="mb-2">
<label class="form-label">Student Name</label>
<input type="text" id="studentName" class="form-control">
</div>

<div class="mb-2">
<label class="form-label">Practical Work 1 (0 - 100)</label>
<input type="number" id="pw1" class="form-control" min="0" max="100">
</div>

<div class="mb-3">
<label class="form-label">Practical Work 2 (0 - 100)</label>
<input type="number" id="pw2" class="form-control" min="0" max="100">
</div>

<button id="btnCalc" class="btn btn-dark w-100">Calculate</button>

<div id="outputBox" class="alert alert-secondary mt-3 mb-0">
Output will appear here
</div>
</div>
</div>

</div>
</div>
</div>

<script src="script_grade.js"></script>
</body>

</body>
</html>
