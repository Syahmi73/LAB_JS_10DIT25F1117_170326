<!DOCTYPE html>
<html>
<head>
    <title>Lab 3.1.1: JavaScript Fundamentals</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        button {
            padding: 8px 15px;
            margin: 5px 0;
            cursor: pointer;
        }

        .pos-box {
            border: 2px solid green;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            width: 300px;
        }

        .checkout-btn {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>Lab 3.1.1: JavaScript Fundamentals</h1>

<h2>Steps 1 - 3: Logic & Console</h2>
<p>Open the Browser Console (F12 > Console)</p>
<button onclick="runConsoleTasks()">Run Console Tasks</button>

<h2>Step 4: Simple UI Output</h2>
<button onclick="startInteraction()">Start Interaction</button>

<div class="pos-box">
    <h2>Final Task: POS Script</h2>
    <p>Price per Item: RM 15.00</p>
    <p>Tax Rate: 6%</p>
    <button class="checkout-btn" onclick="checkout()">Checkout Now</button>
</div>

<script>

function runConsoleTasks() {

    // Step 1: Variables
    let courseName = "Web Design Technology";
    let studentCount = 30;
    let isLabFinished = false;

    console.log("--- Step 1: Variables ---");
    console.log("Course:", courseName);
    console.log("Initial Students:", studentCount);

    // Step 2: Arithmetic
    console.log("--- Step 2: Arithmetic ---");
    console.log("Addition (10+3):", 10 + 3);
    console.log("Remainder (10%3):", 10 % 3);

    // Step 3: Data Types
    console.log("--- Step 3: Data Types ---");
    console.log("Type of courseName:", typeof courseName);
    console.log("Type of studentCount:", typeof studentCount);
    console.log("Type of isLabFinished:", typeof isLabFinished);
}

function startInteraction() {

    let name = prompt("What is your name?");
    alert("Hello " + name + "!");

    let confirmStart = confirm("Do you want to continue?");
    
    if (confirmStart) {
        alert("Great! Let's continue.");
    } else {
        alert("Okay, maybe next time.");
    }
}

function checkout() {

    let pricePerItem = 15.00;
    let taxRate = 0.06;

    let quantity = prompt("Enter quantity:");

    quantity = Number(quantity);

    if (quantity > 0) {

        let subtotal = pricePerItem * quantity;
        let tax = subtotal * taxRate;
        let total = subtotal + tax;

        alert(
            "Subtotal: RM " + subtotal.toFixed(2) +
            "\nTax (6%): RM " + tax.toFixed(2) +
            "\nTotal: RM " + total.toFixed(2)
        );

    } else {
        alert("Invalid quantity!");
    }
}

</script>

</body>
</html>
